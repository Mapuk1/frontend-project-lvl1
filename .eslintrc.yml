---

env:
  browser: true
  es6: true
  node: true

extends:
  - 'plugin:jest/recommended'

globals:
  Atomics: readonly
  SharedArrayBuffer: readonly

parserOptions:
  ecmaVersion: 2018
  sourceType: module

rules:
  no-console: 0
  import/extensions: 0
  semi: ["error", "always"]
  quotes: ["error", "double"]
